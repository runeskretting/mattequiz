{% extends "base.html" %}

{% block title %}Registrer deg – Mattequiz{% endblock %}

{% block content %}
<div class="login-box">
  <h1>Velkommen til Mattequiz!</h1>

  {% if token %}
    <p>Skriv inn fornavnet ditt for å komme i gang.</p>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post">
      <input
        type="text"
        name="name"
        placeholder="Fornavn"
        maxlength="30"
        autofocus
        required
      >
      <button type="submit" class="btn">Kom i gang</button>
    </form>
  {% else %}
    <p class="error">{{ error }}</p>
  {% endif %}
</div>
{% endblock %}
